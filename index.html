<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>宠物养护知识库 - 猫咪狗狗日常护理、疾病防治、饮食指南</title><meta name="description" content="宠物养护知识每日更新，涵盖猫咪狗狗日常护理、常见疾病防治、饮食营养搭配、行为训练技巧。铲屎官必备。"><meta name="keywords" content="宠物养护,猫咪,狗狗,猫粮,狗粮,驱虫,疫苗,猫咪呕吐,狗狗拉肚子"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#fafafa;--card:#fff;--text:#1a1a2e;--t2:#666;--accent:#059669;--border:#e5e7eb;--r:10px}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}.container{max-width:800px;margin:0 auto;padding:0 20px}header{background:linear-gradient(135deg,#059669,#10b981);color:#fff;padding:40px 0;text-align:center;margin-bottom:32px}header h1{font-size:1.8rem}header p{opacity:.9;margin-top:8px;font-size:1rem}.post{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px}.post h2{font-size:1.1rem;margin-bottom:4px}.post h2 a{color:var(--text);text-decoration:none}.post h2 a:hover{color:var(--accent)}.post .date{color:var(--t2);font-size:.8rem;margin-bottom:12px}.entry{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}.entry:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}.entry h3{font-size:.95rem;color:var(--accent)}.entry p{color:var(--t2);font-size:.85rem;margin-top:2px}.tag{display:inline-block;background:#ecfdf5;color:var(--accent);font-size:.7rem;padding:2px 8px;border-radius:10px;margin-left:6px}.archive{margin-top:30px}.archive h3{font-size:1rem;margin-bottom:10px}.archive ul{list-style:none}.archive li{padding:5px 0;font-size:.88rem}.archive a{color:var(--accent);text-decoration:none}.archive .d{color:var(--t2);font-size:.78rem;margin-right:8px}footer{text-align:center;padding:32px 20px;color:var(--t2);font-size:.78rem;border-top:1px solid var(--border);margin-top:40px}footer a{color:var(--accent)}@media(max-width:600px){header{padding:28px 0}header h1{font-size:1.4rem}.post{padding:16px}}</style></head><body><header><h1>🐱🐶 宠物养护知识库</h1><p>猫咪狗狗日常护理 · 疾病防治 · 饮食指南 · 每日更新</p></header><main class="container"><div id="posts"><p style="text-align:center;color:var(--t2);padding:40px">加载中...</p></div><div class="archive" id="archive"></div></main><footer><p>宠物养护知识库 · 每日自动更新 · <a href="feed.json">RSS</a></p></footer><script>fetch('feed.json').then(r=>r.json()).then(d=>{var p=document.getElementById('posts');p.innerHTML='';d.posts.slice(0,7).forEach(function(post){var h='<article class="post"><h2><a href="posts/'+post.slug+'.html">'+esc(post.title)+'</a></h2><div class="date">'+post.date+'</div>';post.items.forEach(function(i){h+='<div class="entry"><h3>'+esc(i.title)+' <span class="tag">'+esc(i.tag)+'</span></h3><p>'+esc(i.desc)+'</p></div>'});h+='</article>';p.innerHTML+=h});var a=document.getElementById('archive');a.innerHTML='<h3>📚 历史文章</h3><ul>';d.posts.forEach(function(post){a.innerHTML+='<li><span class="d">'+post.date+'</span><a href="posts/'+post.slug+'.html">'+esc(post.title)+'</a></li>'});a.innerHTML+='</ul>'}).catch(function(){document.getElementById('posts').innerHTML='<p style="text-align:center;color:var(--t2);padding:40px">内容加载中...</p>'});function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</script></body></html>
